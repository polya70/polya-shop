<!DOCTYPE html>
<html>
<head>
<title>Account</title>

<style>

body{

font-family:Arial;

justify-content:center;

}

.box{
background:#1b1b2e;

width:350px;

input{

</head>

<body>

<p id="status"></p>

</div>

<script>

async function save(){

const email = localStorage.getItem("email")

const pubg = document.getElementById("pubg").value

await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/save-pubg?email="+email+"&id="+pubg
)

document.getElementById("status").innerText="PUBG ID saved"

}

</script>

</body>
</html>
