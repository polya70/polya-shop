<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Account</title>

<style>

body{
background:linear-gradient(120deg,#0f1020,#1b1c3a);
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#17182f;
padding:40px;
border-radius:15px;
width:380px;
text-align:center;
box-shadow:0 0 30px rgba(140,0,255,0.5);
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:#222;
margin:auto;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#0f1020;
color:white;
}

button{
width:100%;
padding:11px;
margin-top:10px;
border:none;
border-radius:6px;
background:#7c3aed;
color:white;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#9333ea;
box-shadow:0 0 10px #9333ea;
}

.nav{
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<div class="avatar"></div>

<h3 id="email"></h3>

<p>💎 Bonus Balance: <span id="bonus">0</span> UC</p>

<input id="pubg" placeholder="Enter PUBG ID">

<button id="saveBtn" onclick="savePubg()">Save PUBG ID</button>

<div class="nav">

<button onclick="goShop()">🛒 Go to Shop</button>

<button onclick="goReviews()">⭐ Reviews</button>

<button onclick="support()">💬 Support</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

const email = localStorage.getItem("email")

document.getElementById("email").innerText = email



// загрузка бонусов

async function loadBonus(){

const res = await fetch("https://snowy-shape-ff1e.polina702070.workers.dev/get-bonus?email="+email)

const bonus = await res.text()

document.getElementById("bonus").innerText = bonus

}

loadBonus()



// сохранение PUBG

async function savePubg(){

const pubg = document.getElementById("pubg").value

await fetch("https://snowy-shape-ff1e.polina702070.workers.dev/save-pubg?email="+email+"&id="+pubg)

document.getElementById("saveBtn").style.display="none"

document.getElementById("pubg").disabled=true

alert("PUBG ID saved")

}



// переходы

function goShop(){

window.location.href="index.html"

}

function goReviews(){

window.location.href="reviews.html"

}

function support(){

window.open("https://t.me/polyad21")

}

function logout(){

localStorage.removeItem("email")

window.location.href="login.html"

}

</script>

</body>
</html>
