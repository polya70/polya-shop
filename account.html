<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Account</title>
</head>

<body>

<div>

<a href="index.html">Home</a> |

<a href="account.html">Profile</a> |

<button onclick="logout()">Logout</button>

</div>

<h2>Your Account</h2>

<p id="userEmail"></p>

<img id="avatar" src="avatar.png" width="120" style="border-radius:60px">

<br><br>

<input type="file" id="avatarInput">

<br><br>

<input id="pubg" placeholder="Enter PUBG ID">

<br><br>

<button onclick="save()">Save PUBG ID</button>

<p id="status"></p>

<script>

const email = localStorage.getItem("email")

if(!email){
window.location.href="login.html"
}

document.getElementById("userEmail").innerText="Email: "+email


async function save(){

const pubg=document.getElementById("pubg").value

await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/save-pubg?email="+email+"&id="+pubg
)

document.getElementById("status").innerText="PUBG ID saved"

}


function logout(){

localStorage.removeItem("email")

window.location.href="login.html"

}


document.getElementById("avatarInput").onchange=function(){

const file=this.files[0]

const reader=new FileReader()

reader.onload=function(e){

document.getElementById("avatar").src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
