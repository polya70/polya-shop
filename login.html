<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
background:#0f1020;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#17182f;
padding:40px;
border-radius:15px;
width:340px;
text-align:center;
box-shadow:0 0 20px rgba(140,0,255,0.5);
}

h2{
color:#c084fc;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:none;
background:#0f1020;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#7c3aed;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#9333ea;
box-shadow:0 0 10px #9333ea;
}

a{
display:block;
margin-top:15px;
color:#c084fc;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="box">

<h2>Login with Telegram</h2>

<a href="https://t.me/polyaa_login_bot" target="_blank">
Open Telegram Bot
</a>

<input id="tgcode" placeholder="Enter Telegram login code">

<button onclick="tglogin()">Login</button>

</div>

<script>

// если пользователь уже вошел — сразу перекинуть в аккаунт
if(localStorage.getItem("logged")==="true"){
window.location.href="account.html"
}

async function tglogin(){

const code=document.getElementById("tgcode").value

const res=await fetch("https://snowy-shape-ff1e.polina702070.workers.dev/telegram-login?code="+code)

const text=await res.text()

if(text==="success"){

// сохраняем сессию
localStorage.setItem("logged","true")
localStorage.setItem("session","active")

// сохраняем время входа (доп защита)
localStorage.setItem("login_time",Date.now())

window.location.href="account.html"

}else{

alert("Wrong code")

}

}

</script>

</body>
</html>
