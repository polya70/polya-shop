<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>Account Login</h2>

<input id="email" placeholder="Enter email">

<br><br>

<input id="code" placeholder="Enter code">

<br><br>

<button onclick="sendCode()">Send code</button>

<button onclick="login()">Login</button>

<script>

async function sendCode(){

const email = document.getElementById("email").value

await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/send-code?email="+email
)

alert("Code sent")

}

async function login(){

const email = document.getElementById("email").value
const code = document.getElementById("code").value

const res = await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/login?email="+email+"&code="+code
)

const text = await res.text()

if(text=="login success"){

localStorage.setItem("email",email)

window.location.href="account.html"

}else{

alert("Wrong code")

}

}

</script>

</body>
</html>
