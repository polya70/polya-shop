<!DOCTYPE html>
<html>
<head>
<title>Account Login</title>

<style>

body{
background:#0f0f1a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1b1b2e;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#6a00ff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#7d1aff;
}

.small{
margin-top:10px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="box">

<h2>Account Login</h2>

<input id="email" placeholder="Email">

<button onclick="sendCode()">Get Code</button>

<input id="code" placeholder="Code from email">

<button onclick="login()">Login</button>

<div class="small">
Login with email verification
</div>

</div>

<script>

async function sendCode(){

const email=document.getElementById("email").value

await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/send-code?email="+email
)

alert("Code generated")

}

async function login(){

const email=document.getElementById("email").value
const code=document.getElementById("code").value

const res = await fetch(
"https://snowy-shape-ff1e.polina702070.workers.dev/login?email="+email+"&code="+code
)

const text = await res.text()

if(text === "login success"){

localStorage.setItem("email", email)

window.location = "account.html"

}else{

alert("Wrong code")

}

}

</script>

</body>
</html>
