<style>

  /* КАРУСЕЛЬ ОТЗЫВОВ */

.reviewCard img{

}

body{

}

.overlay{

/* панель */

.topmenu{
display:flex;
justify-content:center;

}

.menu-btn{

background:linear-gradient(90deg,#6a00ff,#00c3ff);
color:white;

font-weight:bold;
}

/* заголовок */

margin-top:40px;

}

/* картинки отзывов */

.reviews-img{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.reviews-img img{
width:260px;
border-radius:15px;
}

/* форма */

.review-form{
margin-top:40px;
}

input,textarea{
padding:10px;
margin:8px;
border-radius:10px;

width:250px;
}

textarea{
height:80px;
}

button{
padding:10px 25px;
border:none;
border-radius:20px;
background:#7a3cff;
color:white;
cursor:pointer;
}

/* отзывы */

#reviews{
margin-top:40px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.review-card{
background:rgba(255,255,255,0.1);
padding:15px;

}

.review-card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:16px;
margin:20px auto;
max-width:550px;
backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,0.15);
display:flex;
gap:15px;
align-items:flex-start;
animation:fadeIn 0.5s ease;
}

.review-avatar{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(45deg,#6a00ff,#00c3ff);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.review-content{
flex:1;
text-align:left;
}

.review-name{
font-weight:bold;
font-size:16px;
}

.review-stars{
color:#ffd700;
font-size:14px;
margin:4px 0;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* НЕОНОВАЯ ПАНЕЛЬ ОТЗЫВОВ */

.reviewsWrapper{

max-width:1200px;

0 0 30px rgba(160,80,255,0.6),

<body>

}

<video autoplay muted loop>

<div class="overlay"></div>

<!-- панель -->

<div class="topmenu">

<a href="index.html" class="menu-btn">Главная</a>

<a href="https://t.me/polyaa21" class="menu-btn">TELEGRAM CHANNEL</a>

</div>

<h1>REVIEWS POLYA UC</h1>

<h2>Реальные отзывы наших клиентов</h2>

<!-- картинки -->

<div class="reviewsWrapper">

<div class="reviewsCarousel" id="carousel">

<div class="reviewCard">
<img src="review1.jpg">
</div>

<div class="reviewCard">
<img src="review2.jpg">
</div>

<div class="reviewCard">
<img src="review3.jpg">
</div>

</div>

</div>
<!-- форма -->

<div class="review-form">

<h3>Оставить отзыв</h3>

<input id="name" placeholder="Ваше имя">

<br>

<textarea id="text" placeholder="Ваш отзыв"></textarea>

<br>

<button onclick="sendReview()">Отправить</button>

</div>

<!-- отзывы -->

<div id="reviews"></div>

<script>

/* ИСПРАВЛЕННАЯ ФУНКЦИЯ */

function sendReview(){

const name = document.getElementById("name").value
const text = document.getElementById("text").value

fetch(`https://snowy-shape-ff1e.polina702070.workers.dev/send-review?name=${encodeURIComponent(name)}&text=${encodeURIComponent(text)}`)

.then(res=>res.text())

.then(data=>{

if(data==="sent"){
alert("Отзыв отправлен на проверку")
}

})

}

/* загрузка отзывов */

fetch("https://snowy-shape-ff1e.polina702070.workers.dev/get-reviews")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("reviews")

data.reverse().forEach(r=>{

const div=document.createElement("div")

div.className="review-card"

const avatar = r.name.charAt(0).toUpperCase()

div.innerHTML = `
<div class="review-avatar">${avatar}</div>

<div class="review-content">

<div class="review-name">${r.name}</div>

<div class="review-stars">★★★★★</div>

<div>${r.text}</div>

</div>
`

container.appendChild(div)

})

})

</script>

  <script>

let carousel=document.getElementById("carousel")
let position=0

function slideReviews(){

position+=350

if(position > carousel.scrollWidth - 900){
position=0
}

carousel.style.transform="translateX(-"+position+"px)"

}

setInterval(slideReviews,5000)

</script>
