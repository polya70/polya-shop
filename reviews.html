<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Reviews Polya UC</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:#0b0b1a;
}

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* панель */

.topmenu{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.menu-btn{
padding:10px 25px;
border-radius:25px;
background:linear-gradient(90deg,#6a00ff,#00c3ff);
color:white;
text-decoration:none;
font-weight:bold;
}

/* заголовок */

h1{
margin-top:40px;
font-size:36px;
}

/* картинки отзывов */

.reviews-img{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.reviews-img img{
width:260px;
border-radius:15px;
}

/* форма */

.review-form{
margin-top:40px;
}

input,textarea{
padding:10px;
margin:8px;
border-radius:10px;
border:none;
width:250px;
}

textarea{
height:80px;
}

button{
padding:10px 25px;
border:none;
border-radius:20px;
background:#7a3cff;
color:white;
cursor:pointer;
}

/* отзывы */

#reviews{
margin-top:40px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.review-card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin:15px;
}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- панель -->

<div class="topmenu">

<a href="index.html" class="menu-btn">Главная</a>

<a href="https://t.me/polyaa21" class="menu-btn">Telegram</a>

<a href="https://t.me/polyaa21" class="menu-btn">SUPPORT / MANAGER</a>

</div>

<h1>REVIEWS POLYA UC</h1>

<h2>Реальные отзывы наших клиентов</h2>

<!-- картинки -->

<div class="reviews-img">

<img src="review1.jpg">

<img src="review2.jpg">

<img src="review3.jpg">

</div>

<!-- форма -->

<div class="review-form">

<h3>Оставить отзыв</h3>

<input id="name" placeholder="Ваше имя">

<br>

<textarea id="text" placeholder="Ваш отзыв"></textarea>

<br>

<button onclick="sendReview()">Отправить</button>

</div>

<!-- отзывы -->

<div id="reviews"></div>

<script>

function sendReview(){

const name = document.getElementById("name").value

const text = document.getElementById("text").value

fetch(`https://snowy-shape-ff1e.polina702070.workers.dev/?name=${encodeURIComponent(name)}&text=${encodeURIComponent(text)}`)

alert("Отзыв отправлен на проверку")

}

fetch("https://snowy-shape-ff1e.polina702070.workers.dev/get-reviews")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("reviews")

data.reverse().forEach(r=>{

const div=document.createElement("div")

div.className="review-card"

div.innerHTML=`<b>${r.name}</b><br>${r.text}`

container.appendChild(div)

})

})

</script>

</body>
</html>
